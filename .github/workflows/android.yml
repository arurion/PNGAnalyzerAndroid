name: Android CI with Gradle 9.3.1 + JDK 17

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
        cache: gradle

    - name: Generate Gradle Wrapper
      run: gradle wrapper --gradle-version 9.3.1

    - name: Prepare environment files and configure Gradle properties
      run: |
        cp .env.example .env || touch .env
        # Remove in-process Kotlin compiler strategy on CI to prevent KSP Intellij NullPointerException
        sed -i '/kotlin.compiler.execution.strategy/d' gradle.properties
        # Ensure java.awt.headless=true is set to prevent AWT exceptions in KSP headless environments
        if ! grep -q "java.awt.headless" gradle.properties; then
          echo "systemProp.java.awt.headless=true" >> gradle.properties
        fi
        if [ -f debug.keystore.base64 ]; then
          base64 -d debug.keystore.base64 > debug.keystore
        else
          keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "C=US, O=Android, CN=Android Debug"
        fi

    - name: Build Debug APK
      run: ./gradlew assembleDebug

    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: debug-apk
        path: app/build/outputs/apk/debug/app-debug.apk
